services:
  - type: web
    name: serenia-uptime
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: SECRET_KEY
        generateValue: true
      # --- Twilio SMS Alerts (fill these in Render dashboard) ---
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_FROM_NUMBER
        value: ""
      # --- GitHub Dev Tracker ---
      - key: GITHUB_REPO
        value: ""
      - key: GITHUB_TOKEN
        value: ""
