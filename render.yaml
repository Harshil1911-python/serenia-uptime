services:
  - type: web
    name: serenia-uptime
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: serenia-db
          property: connectionString

databases:
  - name: serenia-db
    databaseName: serenia
    user: serenia
    plan: free
